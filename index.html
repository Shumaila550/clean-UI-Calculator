<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProCalc – Smart Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
margin:0;
padding:0;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
align-items:center;
justify-content:center;
}

.calculator{
background:#111827;
padding:25px;
border-radius:25px;
width:380px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
border:1px solid #2d3748;
}

.display{
background:#020617;
border-radius:18px;
padding:20px;
margin-bottom:20px;
border:1px solid #1e293b;
}

#calcDisplay{
width:100%;
background:transparent;
border:none;
outline:none;
color:#e2e8f0;
font-size:40px;
text-align:right;
}

.history-hint{
color:#94a3b8;
text-align:right;
font-size:14px;
margin-bottom:5px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.btn{
background:#1e293b;
border:none;
border-radius:15px;
padding:18px;
font-size:20px;
color:#e2e8f0;
cursor:pointer;
transition:all .15s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.btn:hover{
background:#334155;
transform:translateY(-2px);
}

.btn:active{
transform:scale(1.15);
background:#3b82f6;
box-shadow:0 0 15px #3b82f6;
}

.operator{
background:#2563eb;
color:white;
}

.operator:hover{
background:#3b82f6;
}

.equals{
background:#16a34a;
color:white;
font-size:24px;
}

.equals:hover{
background:#22c55e;
}

.clear{
background:#dc2626;
color:white;
}

.clear:hover{
background:#ef4444;
}

.zero{
grid-column:span 2;
}

.footer-tip{
margin-top:15px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="calculator">

<div class="display">
<div class="history-hint" id="historyHint"></div>
<input type="text" id="calcDisplay" readonly value="0">
</div>

<div class="buttons">

<button class="btn clear" id="clearBtn">AC</button>
<button class="btn operator" id="signBtn">±</button>
<button class="btn operator" id="percentBtn">%</button>
<button class="btn operator" id="divideBtn">÷</button>

<button class="btn" id="btn7">7</button>
<button class="btn" id="btn8">8</button>
<button class="btn" id="btn9">9</button>
<button class="btn operator" id="multiplyBtn">×</button>

<button class="btn" id="btn4">4</button>
<button class="btn" id="btn5">5</button>
<button class="btn" id="btn6">6</button>
<button class="btn operator" id="minusBtn">−</button>

<button class="btn" id="btn1">1</button>
<button class="btn" id="btn2">2</button>
<button class="btn" id="btn3">3</button>
<button class="btn operator" id="plusBtn">+</button>

<button class="btn zero" id="btn0">0</button>
<button class="btn" id="decimalBtn">.</button>
<button class="btn equals" id="equalsBtn">=</button>

</div>

<div class="footer-tip">
Keyboard Supported • Professional UI
</div>

</div>

<script>

(function(){

const display=document.getElementById("calcDisplay")
const historyHint=document.getElementById("historyHint")

let currentInput="0"
let previousOperand=null
let pendingOperator=null
let resetNext=false

const buttons={
btn0:0,
btn1:1,
btn2:2,
btn3:3,
btn4:4,
btn5:5,
btn6:6,
btn7:7,
btn8:8,
btn9:9
}

const operators={
plusBtn:"+",
minusBtn:"-",
multiplyBtn:"*",
divideBtn:"/"
}

function refreshDisplay(){
display.value=currentInput
let hint=""
if(previousOperand!==null){
hint+=previousOperand
if(pendingOperator) hint+=" "+pendingOperator+" "
}
historyHint.textContent=hint
}

function inputDigit(d){

if(resetNext){
currentInput=d
resetNext=false
}

else{
currentInput=currentInput==="0"?d:currentInput+d
}

refreshDisplay()
}

function inputDecimal(){

if(resetNext){
currentInput="0."
resetNext=false
}

else if(!currentInput.includes(".")){
currentInput+="."
}

refreshDisplay()
}

function calculate(a,b,op){

const x=parseFloat(a)
const y=parseFloat(b)

switch(op){

case "+":
return (x+y).toString()

case "-":
return (x-y).toString()

case "*":
return (x*y).toString()

case "/":
return y===0?"Error":(x/y).toString()

default:
return b
}
}

function handleOperator(op){

if(pendingOperator && !resetNext){
currentInput=calculate(previousOperand,currentInput,pendingOperator)
previousOperand=currentInput
}

else{
previousOperand=currentInput
}

pendingOperator=op
resetNext=true

refreshDisplay()
}

function handleEquals(){

if(pendingOperator){

currentInput=calculate(previousOperand,currentInput,pendingOperator)

previousOperand=null
pendingOperator=null
resetNext=true
}

refreshDisplay()
}

function allClear(){

currentInput="0"
previousOperand=null
pendingOperator=null
resetNext=false

refreshDisplay()
}

function toggleSign(){

if(currentInput!=="0"){
currentInput=currentInput.startsWith("-")?
currentInput.slice(1):
"-"+currentInput
}

refreshDisplay()
}

function percent(){

currentInput=(parseFloat(currentInput)/100).toString()
refreshDisplay()

}

Object.keys(buttons).forEach(id=>{
document.getElementById(id).onclick=()=>inputDigit(buttons[id])
})

document.getElementById("decimalBtn").onclick=inputDecimal

Object.keys(operators).forEach(id=>{
document.getElementById(id).onclick=()=>handleOperator(operators[id])
})

document.getElementById("equalsBtn").onclick=handleEquals
document.getElementById("clearBtn").onclick=allClear
document.getElementById("signBtn").onclick=toggleSign
document.getElementById("percentBtn").onclick=percent


window.addEventListener("keydown",(e)=>{

const key=e.key

if(/^[0-9]$/.test(key)) inputDigit(key)

else if(key===".") inputDecimal()

else if(key==="+") handleOperator("+")

else if(key==="-" ) handleOperator("-")

else if(key==="*" ) handleOperator("*")

else if(key==="/") handleOperator("/")

else if(key==="Enter") handleEquals()

else if(key==="Escape") allClear()

})

refreshDisplay()

})()

</script>

</body>
</html>
